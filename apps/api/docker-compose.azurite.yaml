version: "3.8"

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.31.0
    container_name: azurite-blob-storage
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck --loose
    restart: unless-stopped

volumes:
  azurite-data:
    driver: local
