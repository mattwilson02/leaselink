# Forgot Password E2E Test for iOS
#
# Prerequisites:
# 1. Backend must be running: npm run backend:start
# 2. Test client must exist in database with email: test@example.com
# 3. Backend must be configured to accept test token: "test-reset-token-e2e" in test environment
#
# Note: This test uses a deep-link to bypass the email step, testing the app's
# deep-link handling and password reset flow without relying on email delivery.

appId: "com.leaselink.ios"
---
# Launch app and navigate to sign-in screen
- launchApp:
    clearState: true
    clearKeychain: true
    appId: "com.leaselink.ios"
- runFlow: # Optional: handle the development build URL screen as well
    when:
      visible: "http.*" # Check for the development server URL
    commands:
      - tapOn: "http.*" # Tap the URL to load the app
- runFlow: # Use runFlow with a 'when' condition
    when:
      visible: "Continue" # Check if the "Continue" button is visible
    commands:
      - tapOn: "Continue" # Tap the "Continue" button if it appears
- runFlow: # Use runFlow with a 'when' condition
    when:
      visible: "Reload" # Check if the "Continue" button is visible
    commands:
      - tapOn: "Reload" # Tap the "Continue" button if it appears
- assertVisible:
    id: "sign-in-heading"

# Navigate to forgot password flow
- tapOn:
    id: "forgot-password-button"
- assertVisible:
    id: "enter-email-screen"

# Enter email to trigger reset request
- tapOn:
    id: "email-input"
- inputText: "test+forgotpassword@example.com"
- tapOn:
    id: 'keyboard-dismiss'
- tapOn:
    id: "send-link-button"

# Verify check-email screen appears
- assertVisible:
    id: "check-email-screen"

# Simulate clicking the reset link by opening deep-link directly
# This bypasses email delivery and tests the deep-link handling
- openLink: "leaselink://(forgot-password)/reset-password?token=test-reset-token-e2e"

# Tap "Open" button on system dialog (if it appears)
- tapOn:
    text: "Open"
    optional: true

# Verify reset-password screen appears
- assertVisible:
    id: "reset-password-screen"

# Enter new password
- tapOn:
    id: "password-input"
- inputText: "NewPassword123!"
- tapOn:
    id: 'keyboard-dismiss'
- scroll
- tapOn:
    id: "retypepassword-input"
- inputText: "NewPassword123!"
- tapOn:
    id: 'keyboard-dismiss'
- tapOn:
    id: "submit-button"

# Verify success screen appears
- assertVisible:
    id: "reset-success-heading"

# Navigate to sign-in screen
- tapOn:
    id: "login-button"
- assertVisible:
    id: "sign-in-heading"

# Sign in with new password to verify it works
- tapOn:
    id: "email-input"
- inputText: "test+forgotpassword@example.com"
- tapOn:
    id: "password-input"
- inputText: "NewPassword123!"
- tapOn:
    id: "sign-in-button"

- assertVisible:
    id: "home-screen-heading"