name: API CI

on:
  push:
    branches: [main, dev]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - ".github/workflows/api-ci.yaml"
  pull_request:
    branches: [main, dev]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - ".github/workflows/api-ci.yaml"

defaults:
  run:
    working-directory: apps/api

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - name: Build shared package
        run: npm run build --workspace=packages/shared
        working-directory: .

      - run: npx prisma generate
      - run: npm run format
      - run: npm run type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - name: Build shared package
        run: npm run build --workspace=packages/shared
        working-directory: .

      - run: npx prisma generate
      - run: npm run test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    continue-on-error: true

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db?schema=public
      BLOB_STORAGE_ACCOUNT_NAME: devstoreaccount1
      BLOB_STORAGE_ACCOUNT_KEY: Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==
      BLOB_STORAGE_CONTAINER_NAME: test-container
      BLOB_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;
      BLOB_STORAGE_ENDPOINT: http://127.0.0.1:10000
      TWILIO_ACCOUNT_SID: test_sid
      TWILIO_AUTH_TOKEN: test_token
      TWILIO_PHONE_NUMBER: "+10000000000"
      SMTP_HOST: localhost
      SMTP_PORT: "587"
      SMTP_USER: test@test.com
      SMTP_PASSWORD: test
      SMTP_FROM_EMAIL: noreply@leaselink.app
      APP_NAME: LeaseLink
      AZURE_AD_CLIENT_ID: test-client-id
      AZURE_AD_CLIENT_SECRET: test-client-secret
      AZURE_AD_TENANT_ID: test-tenant-id
      JSON_SERVER_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - name: Build shared package
        run: npm run build --workspace=packages/shared
        working-directory: .

      - name: Start Azurite
        run: |
          npm install -g azurite
          mkdir -p /tmp/azurite
          nohup azurite --silent --location /tmp/azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck --loose > /tmp/azurite.log 2>&1 &

      - run: npx prisma generate
      - run: npx prisma migrate deploy

      - name: Run E2E tests
        run: npx vitest run --config ./vitest.config.e2e.mts

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/mattwilson02/leaselink-api:latest
            ghcr.io/mattwilson02/leaselink-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
